name: Apply PR41 Multi-Org Patch

on:
  push:
    branches:
      - claude/complete-master-data-uom-hn893k
    paths:
      - scripts/ci/patch_pr41_stock_adjustments_multiorg.py
      - .github/workflows/apply-pr41-multiorg-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/complete-master-data-uom-hn893k
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply exact-string patch
        run: python scripts/ci/patch_pr41_stock_adjustments_multiorg.py

      - name: Validate patched frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run lint -- --max-warnings=0

      - name: Commit patched source
        run: |
          set -Eeuo pipefail
          if git diff --quiet -- src/features/inventory/index.tsx; then
            echo 'No source changes produced'
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/features/inventory/index.tsx
          git commit -m 'fix(inventory): scope adjustments to selected organization'
          git push origin HEAD:claude/complete-master-data-uom-hn893k
