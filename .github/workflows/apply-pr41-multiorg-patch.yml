name: Apply PR41 Hardening Patches

on:
  push:
    branches:
      - claude/complete-master-data-uom-hn893k
    paths:
      - scripts/ci/patch_pr41_stock_adjustments_multiorg.py
      - scripts/ci/patch_pr41_service_hardening.py
      - .github/workflows/apply-pr41-multiorg-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/complete-master-data-uom-hn893k
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply non-overlapping exact patches
        run: |
          set -Eeuo pipefail
          python scripts/ci/patch_pr41_stock_adjustments_multiorg.py
          python scripts/ci/patch_pr41_service_hardening.py

      - name: Validate patched source before commit
        run: |
          set -Eeuo pipefail
          npm ci
          npx tsc --noEmit
          npm run lint -- --max-warnings=0
          pip install --quiet pglast
          python3 scripts/ci/check_migration_syntax.py
          npx vitest run \
            src/features/inventory/components/__tests__/ProductUomSettings.test.tsx \
            src/services/__tests__/uom-master-data-service.test.ts \
            src/services/__tests__/uom-error-mapper.test.ts

      - name: Remove one-time patch machinery
        run: |
          rm -f scripts/ci/patch_pr41_stock_adjustments_multiorg.py
          rm -f scripts/ci/patch_pr41_uom_rollout_hardening.py
          rm -f scripts/ci/patch_pr41_service_hardening.py
          rm -f scripts/ci/patch_pr41_migration144_staged_invariant.py
          rm -f .github/workflows/apply-pr41-multiorg-patch.yml
          rm -f .github/workflows/apply-pr41-migration144-patch.yml

      - name: Commit patched source and cleanup
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No source changes produced'
            exit 1
          fi
          git commit -m 'fix(uom): close rollout and multi-org review findings'
          git push origin HEAD:claude/complete-master-data-uom-hn893k
