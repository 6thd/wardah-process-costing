name: Apply PR41 Adjustment Org Scope Final

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - scripts/ci/patch_pr41_adjustment_org_scope_final.py
      - .github/workflows/apply-pr41-adjustment-org-scope-final.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 41 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/complete-master-data-uom-hn893k
          fetch-depth: 0

      - name: Apply exact organization-scope patch
        run: python scripts/ci/patch_pr41_adjustment_org_scope_final.py

      - name: Remove one-shot files and commit
        run: |
          set -Eeuo pipefail
          rm -f scripts/ci/patch_pr41_adjustment_org_scope_final.py
          rm -f .github/workflows/apply-pr41-adjustment-org-scope-final.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(inventory): fully scope adjustments to selected organization'
          git push origin HEAD:claude/complete-master-data-uom-hn893k
