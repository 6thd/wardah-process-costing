name: E2E Nightly (Staging)

on:
  schedule:
    # 2:00 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging URL (overrides secret)'
        required: false

jobs:
  e2e:
    name: Playwright E2E on Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight — verify required secrets are set
        run: |
          missing=()
          [ -z "$STAGING_URL" ]          && missing+=("STAGING_URL")
          [ -z "$E2E_USER_EMAIL" ]       && missing+=("E2E_USER_EMAIL")
          [ -z "$E2E_USER_PASSWORD" ]    && missing+=("E2E_USER_PASSWORD")
          [ -z "$E2E_ORG_ADMIN_EMAIL" ]  && missing+=("E2E_ORG_ADMIN_EMAIL")
          [ -z "$E2E_ORG_ADMIN_PASSWORD" ] && missing+=("E2E_ORG_ADMIN_PASSWORD")
          [ -z "$E2E_SUPER_ADMIN_EMAIL" ]  && missing+=("E2E_SUPER_ADMIN_EMAIL")
          [ -z "$E2E_SUPER_ADMIN_PASSWORD" ] && missing+=("E2E_SUPER_ADMIN_PASSWORD")
          [ -z "$E2E_ORG_B_USER_EMAIL" ] && missing+=("E2E_ORG_B_USER_EMAIL")
          [ -z "$E2E_ORG_B_USER_PASSWORD" ] && missing+=("E2E_ORG_B_USER_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo "   Add them in Settings → Secrets → Actions before running E2E."
            exit 1
          fi
          echo "✅ All required secrets are set"
        env:
          STAGING_URL: ${{ inputs.staging_url || secrets.STAGING_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ORG_ADMIN_EMAIL: ${{ secrets.E2E_ORG_ADMIN_EMAIL }}
          E2E_ORG_ADMIN_PASSWORD: ${{ secrets.E2E_ORG_ADMIN_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_ORG_B_USER_EMAIL: ${{ secrets.E2E_ORG_B_USER_EMAIL }}
          E2E_ORG_B_USER_PASSWORD: ${{ secrets.E2E_ORG_B_USER_PASSWORD }}

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.staging_url || secrets.STAGING_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ORG_ADMIN_EMAIL: ${{ secrets.E2E_ORG_ADMIN_EMAIL }}
          E2E_ORG_ADMIN_PASSWORD: ${{ secrets.E2E_ORG_ADMIN_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_ORG_B_USER_EMAIL: ${{ secrets.E2E_ORG_B_USER_EMAIL }}
          E2E_ORG_B_USER_PASSWORD: ${{ secrets.E2E_ORG_B_USER_PASSWORD }}
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
