name: SonarQube Analysis

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check SonarCloud configuration
        id: sonar_cfg
        shell: bash
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping SonarCloud because SONAR_TOKEN is not configured"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.sonar_cfg.outputs.configured == 'true'
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        if: steps.sonar_cfg.outputs.configured == 'true'
        run: npm run test:coverage

      - name: SonarCloud Scan
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

      - name: Collect Sonar diagnostics
        if: always() && steps.sonar_cfg.outputs.configured == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -u
          mkdir -p sonar-diagnostics

          if [ ! -f .scannerwork/report-task.txt ]; then
            printf '%s\n' '{"error":".scannerwork/report-task.txt was not created"}' > sonar-diagnostics/summary.json
            exit 0
          fi

          cp .scannerwork/report-task.txt sonar-diagnostics/report-task.txt
          ce_task_url="$(sed -n 's/^ceTaskUrl=//p' .scannerwork/report-task.txt)"
          dashboard_url="$(sed -n 's/^dashboardUrl=//p' .scannerwork/report-task.txt)"
          project_key="$(sed -n 's/^sonar.projectKey=//p' sonar-project.properties | head -n 1)"

          if [ -z "$ce_task_url" ]; then
            printf '%s\n' '{"error":"ceTaskUrl is missing from report-task.txt"}' > sonar-diagnostics/summary.json
            exit 0
          fi

          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error \
              --user "$SONAR_TOKEN:" \
              "$ce_task_url" \
              --output sonar-diagnostics/ce-task.json || true

            ce_status="$(node -e "const fs=require('fs');try{const j=JSON.parse(fs.readFileSync('sonar-diagnostics/ce-task.json','utf8'));process.stdout.write(j.task?.status||'')}catch{}")"
            if [ "$ce_status" = "SUCCESS" ] || [ "$ce_status" = "FAILED" ] || [ "$ce_status" = "CANCELED" ]; then
              break
            fi
            sleep 2
          done

          analysis_id="$(node -e "const fs=require('fs');try{const j=JSON.parse(fs.readFileSync('sonar-diagnostics/ce-task.json','utf8'));process.stdout.write(j.task?.analysisId||'')}catch{}")"

          if [ -n "$analysis_id" ]; then
            curl --fail --silent --show-error \
              --user "$SONAR_TOKEN:" \
              "https://sonarcloud.io/api/qualitygates/project_status?analysisId=$analysis_id" \
              --output sonar-diagnostics/quality-gate.json || true
          fi

          if [ -n "$project_key" ] && [ -n "${PR_NUMBER:-}" ]; then
            curl --fail --silent --show-error --get \
              --user "$SONAR_TOKEN:" \
              --data-urlencode "componentKeys=$project_key" \
              --data-urlencode "pullRequest=$PR_NUMBER" \
              --data-urlencode "statuses=OPEN,CONFIRMED" \
              --data-urlencode "types=BUG" \
              --data-urlencode "ps=500" \
              "https://sonarcloud.io/api/issues/search" \
              --output sonar-diagnostics/open-bugs.json || true

            curl --fail --silent --show-error --get \
              --user "$SONAR_TOKEN:" \
              --data-urlencode "component=$project_key" \
              --data-urlencode "pullRequest=$PR_NUMBER" \
              --data-urlencode "metricKeys=new_coverage,new_duplicated_lines_density,new_reliability_rating,new_bugs,new_lines,lines_to_cover,uncovered_lines,duplicated_lines,duplicated_blocks" \
              --data-urlencode "qualifiers=FIL" \
              --data-urlencode "strategy=leaves" \
              --data-urlencode "ps=500" \
              "https://sonarcloud.io/api/measures/component_tree" \
              --output sonar-diagnostics/file-measures.json || true
          fi

          node <<'NODE'
          const fs = require('fs')
          const readJson = (path) => {
            try { return JSON.parse(fs.readFileSync(path, 'utf8')) } catch { return null }
          }
          const ce = readJson('sonar-diagnostics/ce-task.json')
          const gate = readJson('sonar-diagnostics/quality-gate.json')
          const bugs = readJson('sonar-diagnostics/open-bugs.json')
          const measures = readJson('sonar-diagnostics/file-measures.json')
          const conditions = gate?.projectStatus?.conditions ?? []
          const failed = conditions.filter((condition) => condition.status !== 'OK')
          const valueOf = (component, metric) => {
            const measure = component?.measures?.find((item) => item.metric === metric)
            const raw = measure?.period?.value ?? measure?.value
            return raw === undefined ? null : Number(raw)
          }
          const files = (measures?.components ?? []).map((component) => ({
            key: component.key,
            path: component.path,
            name: component.name,
            newCoverage: valueOf(component, 'new_coverage'),
            newDuplication: valueOf(component, 'new_duplicated_lines_density'),
            newLines: valueOf(component, 'new_lines'),
            uncoveredLines: valueOf(component, 'uncovered_lines'),
            duplicatedLines: valueOf(component, 'duplicated_lines'),
            duplicatedBlocks: valueOf(component, 'duplicated_blocks'),
          }))
          const coverageHotspots = [...files]
            .filter((file) => file.newLines > 0 && file.newCoverage !== null)
            .sort((a, b) => (a.newCoverage - b.newCoverage) || (b.newLines - a.newLines))
            .slice(0, 30)
          const duplicationHotspots = [...files]
            .filter((file) => (file.newDuplication ?? 0) > 0 || (file.duplicatedLines ?? 0) > 0)
            .sort((a, b) => (b.newDuplication - a.newDuplication) || (b.duplicatedLines - a.duplicatedLines))
            .slice(0, 30)
          const openBugs = (bugs?.issues ?? []).map((issue) => ({
            key: issue.key,
            rule: issue.rule,
            severity: issue.severity,
            impacts: issue.impacts,
            component: issue.component,
            line: issue.line,
            message: issue.message,
          }))
          const summary = {
            computeEngineStatus: ce?.task?.status ?? null,
            computeEngineError: ce?.task?.errorMessage ?? null,
            analysisId: ce?.task?.analysisId ?? null,
            qualityGateStatus: gate?.projectStatus?.status ?? null,
            failedConditions: failed.map((condition) => ({
              metricKey: condition.metricKey,
              comparator: condition.comparator,
              errorThreshold: condition.errorThreshold,
              actualValue: condition.actualValue,
              status: condition.status,
            })),
            openBugs,
            coverageHotspots,
            duplicationHotspots,
          }
          fs.writeFileSync('sonar-diagnostics/summary.json', JSON.stringify(summary, null, 2))
          console.log(JSON.stringify(summary, null, 2))
          NODE

          if [ -n "$dashboard_url" ]; then
            echo "Sonar dashboard: $dashboard_url"
          fi

      - name: Upload Sonar diagnostics
        if: always() && steps.sonar_cfg.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonar-diagnostics-${{ github.run_id }}
          path: sonar-diagnostics/
          if-no-files-found: warn
          retention-days: 14
