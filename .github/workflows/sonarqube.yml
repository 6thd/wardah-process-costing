name: SonarQube Analysis

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      # يتخطّى الوظيفة كاملةً بأمان حين لا يكون SONAR_TOKEN مضبوطاً في أسرار
      # المستودع — فلا يظهر فحص أحمر على كل PR بينما SonarCloud غير مُهيّأ.
      # اضبط السرّ SONAR_TOKEN (Settings → Secrets) ليعمل التحليل تلقائياً.
      - name: Check SonarCloud configuration
        id: sonar_cfg
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::تخطّي SonarCloud — SONAR_TOKEN غير مضبوط في أسرار المستودع"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Setup Node.js
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        if: steps.sonar_cfg.outputs.configured == 'true'
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        if: steps.sonar_cfg.outputs.configured == 'true'
        run: npm run test:coverage
        continue-on-error: false

      # SONAR_TOKEN مضبوط الآن → يعمل التحليل فعلاً ويرفع النتائج لـ SonarCloud.
      # sonar.qualitygate.wait=true: الخطوة تنتظر نتيجة البوابة وتفشل إن لم تمرّ.
      # لجعل السكان غير حاجز (reporting فقط): احذف -Dsonar.qualitygate.wait=true.
      - name: SonarCloud Scan
        if: steps.sonar_cfg.outputs.configured == 'true'
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
