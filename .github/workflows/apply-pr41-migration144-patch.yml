name: Apply PR41 Migration 144 Patch

on:
  push:
    branches:
      - claude/complete-master-data-uom-hn893k
    paths:
      - scripts/ci/patch_pr41_migration144_staged_invariant.py
      - .github/workflows/apply-pr41-migration144-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/complete-master-data-uom-hn893k
          fetch-depth: 0

      - name: Apply exact migration patch
        run: python scripts/ci/patch_pr41_migration144_staged_invariant.py

      - name: Validate SQL and rollout behavior
        run: |
          set -Eeuo pipefail
          pip install --quiet pglast
          python3 scripts/ci/check_migration_syntax.py
          grep -q "NOT VALID" sql/migrations/144_products_base_uom_change_guard.sql
          if grep -q "VALIDATE CONSTRAINT products_base_uom_mapping_invariant" \
            sql/migrations/144_products_base_uom_change_guard.sql; then
            echo 'Migration 144 still validates historical rows'
            exit 1
          fi

      - name: Commit and remove one-shot machinery
        run: |
          set -Eeuo pipefail
          rm -f scripts/ci/patch_pr41_migration144_staged_invariant.py
          rm -f .github/workflows/apply-pr41-migration144-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(uom): stage product mapping invariant safely'
          git push origin HEAD:claude/complete-master-data-uom-hn893k

# One-shot trigger refreshed after acceptance-144 scenarios were isolated.
