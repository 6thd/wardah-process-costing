name: Apply settings locale fixes

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/settings-localization-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply guarded fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'src/components/layout/sidebar.tsx',
              "  const isRTL = i18n.language === 'ar'",
              "  const isRTL = (i18n.resolvedLanguage ?? i18n.language).toLowerCase().startsWith('ar')",
          )
          replace_once(
              'src/features/settings/SystemSettingsPage.tsx',
              "toast.error(error instanceof Error ? error.message : 'Failed to load system settings')",
              "toast.error(error instanceof Error ? error.message : tr('فشل تحميل إعدادات النظام', 'Failed to load system settings'))",
          )
          replace_once(
              'src/features/settings/CompanySettings.tsx',
              "  country: 'المملكة العربية السعودية',",
              "  country: '',",
          )
          Path('.github/workflows/apply-sidebar-rtl-fix.yml').unlink()
          PY
      - name: Commit fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/layout/sidebar.tsx src/features/settings/SystemSettingsPage.tsx src/features/settings/CompanySettings.tsx .github/workflows/apply-sidebar-rtl-fix.yml
          git commit -m "fix(settings): normalize locale edge cases"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
