name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: i18n hardcoded-text gate
        run: node scripts/i18n/count-hardcoded.mjs --ci

      - name: i18n extended report (informational)
        run: node scripts/i18n/count-hardcoded.mjs --extended
        continue-on-error: true

      - name: Check generated types are committed
        run: |
          if [ ! -f "src/types/database.generated.ts" ]; then
            echo "❌ src/types/database.generated.ts مفقود — شغّل 'supabase gen types' وأودِع الناتج"
            exit 1
          fi
          LINES=$(wc -l < src/types/database.generated.ts)
          if [ "$LINES" -lt 100 ]; then
            echo "❌ src/types/database.generated.ts يبدو فارغاً أو تالفاً (${LINES} سطر)"
            exit 1
          fi
          echo "✅ src/types/database.generated.ts موجود (${LINES} سطر)"

      - name: TypeScript type check
        id: typecheck
        run: |
          mkdir -p reports
          set +e
          npm run type-check 2>&1 | tee reports/typecheck.log
          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-${{ github.run_id }}
          path: reports/typecheck.log
          if-no-files-found: error
          retention-days: 14

      - name: Enforce TypeScript type check
        run: test "${{ steps.typecheck.outputs.status }}" -eq 0

      - name: ESLint check
        run: npm run lint

      - name: Unit & integration tests
        run: >-
          npm run test -- --run --coverage.enabled=false
          --reporter=default --reporter=junit
          --outputFile.junit=reports/vitest-junit.xml

      - name: Upload Vitest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-${{ github.run_id }}
          path: reports/vitest-junit.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Migration SQL syntax check (pglast)
        run: |
          pip install --quiet pglast
          python3 scripts/ci/check_migration_syntax.py

      - name: Validate migration numbering
        run: |
          pip install --quiet pyyaml
          python3 - <<'PYEOF'
          import yaml, sys, pathlib

          MIGRATIONS_DIR = pathlib.Path("sql/migrations")
          SKIPPED_FILE = MIGRATIONS_DIR / "skipped_migration_numbers.yml"

          if not SKIPPED_FILE.exists():
              print(f"❌ {SKIPPED_FILE} مفقود — أنشئه لتوثيق أرقام migrations المتجاوزة")
              sys.exit(1)

          with open(SKIPPED_FILE, encoding="utf-8") as f:
              data = yaml.safe_load(f)
          skipped = {int(e["number"]) for e in (data or {}).get("skipped", [])}

          nums = []
          for p in MIGRATIONS_DIR.iterdir():
              parts = p.stem.split("_")
              if parts[0].isdigit():
                  nums.append(int(parts[0]))

          if not nums:
              print("❌ لا ملفات migrations مرقّمة في sql/migrations/", file=sys.stderr)
              sys.exit(1)

          max_num = max(nums)
          existing = set(nums)
          missing = [i for i in range(1, max_num + 1)
                     if i not in existing and i not in skipped]

          if missing:
              print(f"❌ أرقام migrations مفقودة وغير موثَّقة في skipped_migration_numbers.yml: {missing}",
                    file=sys.stderr)
              sys.exit(1)

          print(f"✅ ترقيم migrations سليم (1–{max_num})، {len(skipped)} رقم موثَّق كمتجاوز")
          PYEOF

      - name: DEFINER guard check (no new unguarded DEFINER functions)
        run: python3 scripts/ci/check_definer_guards.py

      - name: Fresh DB chain test
        run: |
          set -Eeuo pipefail
          BASELINE=$(ls sql/baseline/000_schema_baseline_*.sql 2>/dev/null | sort | tail -1)
          if [ -z "$BASELINE" ]; then
            echo "⏭ لا baseline بعد — تجاوز اختبار البناء من الصفر"
            exit 0
          fi

          echo "✅ Baseline موجود: $BASELINE"
          CUTOFF=$(grep -oE '^-- migration_cutoff: ([0-9]+)' "$BASELINE" \
                   | grep -oE '[0-9]+$' | head -1)
          CUTOFF=${CUTOFF:-0}
          echo "   migration_cutoff = $CUTOFF"
          echo "   PostgreSQL client: $(psql --version)"

          createdb wardah_fresh
          psql -v ON_ERROR_STOP=1 -d wardah_fresh -f scripts/ci/fresh-db/supabase_shim.sql -q
          psql -v ON_ERROR_STOP=1 -d wardah_fresh -f "$BASELINE" -q

          TABLES=$(psql -d wardah_fresh -tAc "SELECT count(*) FROM pg_tables WHERE schemaname='public'")
          SEQS=$(psql -d wardah_fresh -tAc "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON c.relnamespace=n.oid WHERE n.nspname='public' AND c.relkind='S'")
          FUNCS=$(psql -d wardah_fresh -tAc "SELECT count(*) FROM pg_proc p JOIN pg_namespace n ON p.pronamespace=n.oid WHERE n.nspname='public' AND p.prokind='f'")
          POLICIES=$(psql -d wardah_fresh -tAc "SELECT count(*) FROM pg_policies WHERE schemaname='public'")
          echo "   Schema counts after baseline: tables=$TABLES seqs=$SEQS funcs=$FUNCS policies=$POLICIES"
          if [ "$TABLES" -lt 120 ] || [ "$SEQS" -lt 10 ] || [ "$FUNCS" -lt 150 ] || [ "$POLICIES" -lt 300 ]; then
            echo "❌ عدد كائنات ما بعد الـbaseline أقل من الحد الأدنى المتوقع"
            exit 1
          fi

          GENERATED=$(psql -d wardah_fresh -tAc "SELECT count(*) FROM pg_attribute a JOIN pg_class c ON a.attrelid = c.oid JOIN pg_namespace n ON c.relnamespace = n.oid WHERE n.nspname = 'public' AND a.attgenerated = 's' AND NOT a.attisdropped")
          echo "   Generated columns: $GENERATED (expected ≥22)"
          if [ "$GENERATED" -lt 22 ]; then
            echo "❌ الأعمدة المحسوبة أقل من المتوقع"
            exit 1
          fi

          python3 scripts/ci/fresh-db/build_apply_order.py sql/migrations "$CUTOFF" > /tmp/chain_order.txt
          TOTAL=$(wc -l < /tmp/chain_order.txt)
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ لا migrations جديدة بعد baseline (cutoff=$CUTOFF) — اكتمل"
            exit 0
          fi

          echo "   تطبيق $TOTAL migration(s) بعد cutoff $CUTOFF …"
          set +e
          REPORT=/tmp/chain_report.txt PGDATABASE=wardah_fresh bash scripts/ci/fresh-db/run_chain.sh sql/migrations /tmp/chain_order.txt
          STATUS=$?
          set -e
          tail -20 /tmp/chain_report.txt

          if [ $STATUS -ne 0 ]; then
            echo "❌ fresh-db chain test فشل"
            grep -E '^(FAIL|NOT_RUN) ' /tmp/chain_report.txt || true
            exit 1
          fi
          echo "✅ fresh-db chain test اجتاز بنجاح على PostgreSQL 17"
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: Migration 144 acceptance (base-UoM guard + backfill RPCs)
        run: |
          set -Eeuo pipefail
          if ! psql -d wardah_fresh -tAc "SELECT 1 FROM pg_trigger WHERE tgname='trg_products_base_uom_change_guard'" | grep -q 1; then
            echo "⏭ migration 144 not present in fresh DB (baseline may be ahead) — skipping acceptance"
            exit 0
          fi
          echo "   تشغيل اختبار قبول migration 144 (عزل المؤسسات + الحارس + مسارات المواءمة)…"
          psql -v ON_ERROR_STOP=1 -d wardah_fresh -f scripts/ci/fresh-db/acceptance_144_base_uom_guard.sql
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Server (placeholder)
        run: echo "⚠️ Deploy step is a placeholder — deployment is handled externally."
