name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 18/20 انتهى دعمهما — موحَّد مع sonarqube.yml على 24 LTS
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # P5: التحقق من أن ملف الأنواع المولَّدة محدَّث مع المخطط المُودَع
      # (يكشف تناقضاً بين database.generated.ts المُودَع والأنواع التي سيولّدها CLI
      #  عبر مقارنة بسيطة لحجم الملف — تحديث كامل يتطلب بيانات اعتماد Supabase)
      - name: Check generated types are committed
        run: |
          if [ ! -f "src/types/database.generated.ts" ]; then
            echo "❌ src/types/database.generated.ts مفقود — شغّل 'supabase gen types' وأودِع الناتج"
            exit 1
          fi
          LINES=$(wc -l < src/types/database.generated.ts)
          if [ "$LINES" -lt 100 ]; then
            echo "❌ src/types/database.generated.ts يبدو فارغاً أو تالفاً (${LINES} سطر)"
            exit 1
          fi
          echo "✅ src/types/database.generated.ts موجود (${LINES} سطر)"

      - name: TypeScript type check
        run: npm run type-check
        continue-on-error: false

      - name: ESLint check
        run: npm run lint
        continue-on-error: false

      # P4-C1: الاختبارات حاجز حقيقي — أي فشل يمنع الدمج والنشر
      # (coverage معطَّل هنا للسرعة — SonarQube يتولى قياس التغطية)
      - name: Unit & integration tests
        run: npm run test -- --run --coverage.enabled=false
        continue-on-error: false

      # P2: التحقق من اتساق ترقيم الـ migrations (لا ثغرات في الأرقام، كل ملف في MANIFEST)
      - name: Validate migration numbering
        run: |
          set -e
          MANIFEST="sql/migrations/MANIFEST.md"
          MIGRATIONS_DIR="sql/migrations"

          # استخرج أعلى رقم migration من أسماء الملفات
          MAX_NUM=$(ls "$MIGRATIONS_DIR" | grep -E '^[0-9]+_' | \
                    sed 's/_.*//' | sort -n | tail -1)

          # تحقق من أن كل رقم من 1 إلى MAX_NUM موجود (أو موثَّق في MANIFEST كمتجاوز)
          MISSING=()
          for i in $(seq 1 "$MAX_NUM"); do
            FILE_COUNT=$(ls "$MIGRATIONS_DIR" | grep -cE "^${i}_" || true)
            if [ "$FILE_COUNT" -eq 0 ]; then
              # ثغرة — تحقق أنها موثَّقة في MANIFEST كمتجاوزة
              if ! grep -qE "\b${i}\b" "$MANIFEST"; then
                MISSING+=("$i")
              fi
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "❌ أرقام migrations مفقودة وغير موثَّقة في MANIFEST: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ ترقيم migrations سليم (1–${MAX_NUM})"

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Server
        run: echo "Add your deployment script here"
        # يمكنك إضافة deployment script هنا
        # مثل: rsync, AWS S3, Vercel, Netlify, etc.
