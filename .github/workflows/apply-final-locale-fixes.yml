name: Apply final locale fixes

on:
  push:
    branches: [codex/i18n-number-format-settings]
    paths: [.github/workflows/apply-final-locale-fixes.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply guarded locale codemod
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/fix.py
          python /tmp/fix.py
          npm ci --ignore-scripts
          npm run type-check
          npm run lint
          npm run test -- --run --coverage.enabled=false
          rm .github/workflows/apply-final-locale-fixes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/settings/CompanySettings.tsx src/features/hr/pages/SettlementsPage.tsx src/pages/org-admin/audit-log.tsx .github/workflows/apply-final-locale-fixes.yml
          git commit -m "fix(i18n): complete organization locale coverage"
          git push origin HEAD:codex/i18n-number-format-settings
